<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity & Beyond | For Her</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0a0a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            background-color: var(--dark-bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        #cursor {
            width: 20px;
            height: 20px;
            background: var(--gold);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 999;
            transition: transform 0.1s ease;
            box-shadow: 0 0 15px var(--gold);
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .luxury-card {
            position: relative;
            z-index: 10;
            width: 450px;
            padding: 60px 40px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 215, 0, 0.2);
            border-radius: 2px;
            text-align: center;
            box-shadow: 0 40px 100px rgba(0,0,0,0.5);
            transition: 0.5s ease;
        }

        .luxury-card::before {
            content: '';
            position: absolute;
            top: -10px; left: -10px; right: -10px; bottom: -10px;
            border: 1px solid var(--gold);
            opacity: 0.3;
            pointer-events: none;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 32px;
            margin-bottom: 25px;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .typewriter {
            font-size: 18px;
            color: #e0e0e0;
            line-height: 1.6;
            min-height: 80px;
            margin-bottom: 40px;
            font-weight: 300;
            font-style: italic;
        }

        .luxury-btn {
            padding: 15px 35px;
            background: transparent;
            color: var(--gold);
            border: 1px solid var(--gold);
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 12px;
            font-weight: 600;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .luxury-btn:hover {
            background: var(--gold);
            color: #000;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .luxury-card {
            animation: fadeIn 1.5s ease-out;
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <canvas id="canvas"></canvas>

    <div class="luxury-card" id="card">
        <h1>Eternal Beauty</h1>
        <div class="typewriter" id="text-box"></div>
        <button class="luxury-btn" onclick="nextMessage()">Unlock My Heart</button>
    </div>

    <script>
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // আপনার দেওয়া নতুন ৪টি ক্যাপশন
        const messages = [
            "চাঁদের আলো অনেক দেখেছি, কিন্তু তোমার হাসির মতো স্নিগ্ধতা আর কোথাও খুঁজে পাইনি। ❤️",
            "অপূর্ব সৌন্দর্য আর একরাশ মায়া—এই তো তুমি। 🌸",
            "তুমার রূপের বর্ণনা কোনো শব্দে সীমাবদ্ধ নয়, এ যেন এক না বলা কবিতার ছন্দ। ✨",
            "হাজারো ভিড়ের মাঝেও আমার চোখ শুধু তোমাকেই খুঁজে পায়... আই লাভ ইউ! ❤️"
        ];
        
        let msgIndex = 0;
        let charIndex = 0;
        const textBox = document.getElementById('text-box');

        function typeWriter() {
            if (charIndex < messages[msgIndex].length) {
                textBox.innerHTML += messages[msgIndex].charAt(charIndex);
                charIndex++;
                setTimeout(typeWriter, 70);
            }
        }

        function nextMessage() {
            if(msgIndex < messages.length - 1) {
                msgIndex++;
                charIndex = 0;
                textBox.innerHTML = "";
                typeWriter();
            } else {
                alert("তুমি আমার রাজকুমারী! ✨");
            }
        }

        window.onload = typeWriter;

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2 + 0.1;
                this.speedX = Math.random() * 1 - 0.5;
                this.speedY = Math.random() * 1 - 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.01;
            }
            draw() {
                ctx.fillStyle = '#d4af37';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].size <= 0.2) {
                    particles.splice(i, 1);
                    i--;
                    particles.push(new Particle());
                }
            }
            requestAnimationFrame(animate);
        }
        init();
        animate();
    </script>
</body>
</html>
