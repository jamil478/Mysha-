<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Masterpiece | For Her</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #d4af37; /* গোল্ডেন */
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            perspective: 1000px; /* 3D ইফেক্টের জন্য */
        }

        /* কাস্টম প্রিমিয়াম কার্সার */
        #cursor {
            width: 15px;
            height: 15px;
            background: var(--accent);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 1000;
            mix-blend-mode: difference;
            transition: transform 0.15s ease-out;
        }

        /* ব্যাকগ্রাউন্ড গ্লো ইফেক্ট */
        .glow {
            position: absolute;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        /* 3D লাক্সারি কার্ড */
        .master-card {
            position: relative;
            z-index: 10;
            width: 480px;
            padding: 80px 50px;
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid rgba(212, 175, 55, 0.15);
            text-align: center;
            transform-style: preserve-3d;
            transition: 0.1s ease;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
        }

        /* গোল্ডেন কর্নার বর্ডারস */
        .master-card::before, .master-card::after {
            content: '';
            position: absolute;
            width: 30px;
            height: 30px;
            border: 2px solid var(--accent);
        }
        .master-card::before { top: 20px; left: 20px; border-right: 0; border-bottom: 0; }
        .master-card::after { bottom: 20px; right: 20px; border-left: 0; border-top: 0; }

        h1 {
            font-family: 'Playfair Display', serif;
            color: var(--accent);
            font-size: 38px;
            margin-bottom: 30px;
            letter-spacing: 5px;
            font-weight: 700;
            text-transform: uppercase;
        }

        .content-box {
            font-size: 19px;
            color: #f0f0f0;
            line-height: 1.8;
            min-height: 100px;
            margin-bottom: 50px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .btn-luxe {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            padding: 18px 45px;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 600;
            transition: 0.5s;
            position: relative;
            overflow: hidden;
        }

        .btn-luxe:hover {
            background: var(--accent);
            color: #000;
            box-shadow: 0 0 40px rgba(212, 175, 55, 0.3);
            transform: scale(1.05);
        }

        /* এনিমেশনস */
        @keyframes float {
            0% { transform: translateZ(0px); }
            50% { transform: translateZ(50px); }
            100% { transform: translateZ(0px); }
        }
    </style>
</head>
<body>

    <div id="cursor"></div>
    <div class="glow" id="glow"></div>

    <div class="master-card" id="card">
        <h1>Celestial</h1>
        <div class="content-box" id="msg-container"></div>
        <button class="btn-luxe" onclick="revealNext()">Discover More</button>
    </div>

    <script>
        const card = document.getElementById('card');
        const cursor = document.getElementById('cursor');
        const glow = document.getElementById('glow');

        // মাউস ট্র্যাকিং এবং 3D টিল্ট ইফেক্ট
        document.addEventListener('mousemove', (e) => {
            // কার্সার এবং গ্লো মুভমেন্ট
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
            glow.style.left = (e.clientX - 250) + 'px';
            glow.style.top = (e.clientY - 250) + 'px';

            // 3D রোটেশন ক্যালকুলেশন
            let xAxis = (window.innerWidth / 2 - e.clientX) / 25;
            let yAxis = (window.innerHeight / 2 - e.clientY) / 25;
            card.style.transform = `rotateY(${xAxis}deg) rotateX(${yAxis}deg)`;
        });

        // আপনার দেওয়া ৪টি স্পেশাল ক্যাপশন
        const messages = [
            "চাঁদের আলো অনেক দেখেছি, কিন্তু তোমার হাসির মতো স্নিগ্ধতা আর কোথাও খুঁজে পাইনি। ❤️",
            "অপূর্ব সৌন্দর্য আর একরাশ মায়া—এই তো তুমি। 🌸",
            "তুমার রূপের বর্ণনা কোনো শব্দে সীমাবদ্ধ নয়, এ যেন এক না বলা কবিতার ছন্দ। ✨",
            "হাজারো ভিড়ের মাঝেও আমার চোখ শুধু তোমাকেই খুঁজে পায়... সারাজীবন পাশে থেকো। 💍"
        ];

        let index = 0;
        const msgContainer = document.getElementById('msg-container');

        function typeEffect(text, i = 0) {
            if (i === 0) msgContainer.innerHTML = "";
            if (i < text.length) {
                msgContainer.innerHTML += text.charAt(i);
                setTimeout(() => typeEffect(text, i + 1), 60);
            }
        }

        function revealNext() {
            if (index < messages.length) {
                typeEffect(messages[index]);
                index++;
            } else {
                msgContainer.innerHTML = "তুমিই আমার শ্রেষ্ঠ উপহার! ✨";
                document.querySelector('.btn-luxe').style.display = 'none';
            }
        }

        // ফার্স্ট মেসেজ লোড করা
        window.onload = () => {
            typeEffect(messages[0]);
            index = 1;
        };
    </script>
</body>
</html>
