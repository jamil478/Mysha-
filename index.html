<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Aesthetic Soul | Special Surprise</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@200;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --bg-dark: #080808;
            --text-light: #f1f1f1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            cursor: none;
        }

        body {
            background: var(--bg-dark);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
        }

        /* কাস্টম প্রিমিয়াম কার্সার */
        #cursor-follower {
            position: fixed;
            width: 40px;
            height: 40px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transition: transform 0.15s cubic-bezier(0.17, 0.67, 0.83, 0.67), opacity 0.3s;
        }

        #cursor-dot {
            position: fixed;
            width: 6px;
            height: 6px;
            background: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1001;
        }

        /* লিকুইড ব্যাকগ্রাউন্ড */
        .liquid-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, #1a150e 0%, #080808 100%);
            z-index: -1;
        }

        .glow-spot {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(197, 160, 89, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
            transition: 0.2s;
        }

        /* লাক্সারি কার্ড */
        .luxury-wrap {
            position: relative;
            z-index: 10;
            width: 550px;
            padding: 80px 40px;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(50px);
            -webkit-backdrop-filter: blur(50px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            text-align: center;
            animation: slideIn 2s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-family: 'Playfair Display', serif;
            color: var(--gold);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 8px;
            margin-bottom: 40px;
            opacity: 0.8;
        }

        .quote-container {
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quote {
            color: var(--text-light);
            font-size: 24px;
            line-height: 1.6;
            font-family: 'Playfair Display', serif;
            font-style: italic;
            transition: 1s ease;
            opacity: 0;
        }

        .quote.active {
            opacity: 1;
        }

        .footer-line {
            margin-top: 50px;
            height: 1px;
            width: 60px;
            background: var(--gold);
            display: inline-block;
            opacity: 0.5;
        }

        .action-btn {
            display: block;
            margin: 40px auto 0;
            background: transparent;
            border: none;
            color: var(--gold);
            font-size: 12px;
            letter-spacing: 3px;
            text-transform: uppercase;
            font-weight: 600;
            transition: 0.3s;
        }

        .action-btn:hover {
            letter-spacing: 5px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div id="cursor-follower"></div>
    <div id="cursor-dot"></div>
    <div class="liquid-bg"></div>
    <div class="glow-spot" id="glow"></div>

    <div class="luxury-wrap">
        <div class="title">Celestial Beauty</div>
        <div class="quote-container">
            <p class="quote" id="quote-text"></p>
        </div>
        <div class="footer-line"></div>
        <button class="action-btn" onclick="changeQuote()">Next Chapter</button>
    </div>

    <script>
        const follower = document.getElementById('cursor-follower');
        const dot = document.getElementById('cursor-dot');
        const glow = document.getElementById('glow');

        // কাস্টম কার্সার এবং গ্লো ইফেক্ট
        document.addEventListener('mousemove', (e) => {
            dot.style.left = e.clientX + 'px';
            dot.style.top = e.clientY + 'px';
            
            setTimeout(() => {
                follower.style.left = (e.clientX - 20) + 'px';
                follower.style.top = (e.clientY - 20) + 'px';
            }, 50);

            glow.style.left = (e.clientX - 300) + 'px';
            glow.style.top = (e.clientY - 300) + 'px';
        });

        const quotes = [
            "চাঁদের আলো অনেক দেখেছি, কিন্তু তোমার হাসির মতো স্নিগ্ধতা আর কোথাও খুঁজে পাইনি। ❤️",
            "অপূর্ব সৌন্দর্য আর একরাশ মায়া—এই তো তুমি। 🌸",
            "তুমার রূপের বর্ণনা কোনো শব্দে সীমাবদ্ধ নয়, এ যেন এক না বলা কবিতার ছন্দ। ✨",
            "হাজারো ভিড়ের মাঝেও আমার চোখ শুধু তোমাকেই খুঁজে পায়... আই লাভ ইউ! ❤️"
        ];

        let currentIdx = 0;
        const quoteEl = document.getElementById('quote-text');

        function changeQuote() {
            quoteEl.classList.remove('active');
            
            setTimeout(() => {
                quoteEl.innerText = quotes[currentIdx];
                quoteEl.classList.add('active');
                currentIdx = (currentIdx + 1) % quotes.length;
            }, 500);
        }

        // ইনিশিয়াল লোড
        window.onload = changeQuote;
    </script>
</body>
</html>
